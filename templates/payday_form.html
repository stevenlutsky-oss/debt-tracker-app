{% extends "base.html" %}

{% block title %}{{ title }} - Debt Tracker{% endblock %}

{% block content %}

<div class="card">
    <h2>💰 {{ title }}</h2>
    
    <form method="POST" style="max-width: 500px;">
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Payday Name</label>
            <input type="text" name="name" value="{{ payday.name if payday else 'Payday' }}" required 
                   style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px;"
                   placeholder="e.g., Bi-weekly, Bonus">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Schedule Type</label>
            <select name="payday_type" id="paydayType" onchange="togglePaydayFields()" 
                    style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px;">
                <option value="day_of_month" {% if payday and payday.payday_type == 'day_of_month' %}selected{% endif %}>Fixed Day of Month</option>
                <option value="second_friday" {% if payday and payday.payday_type == 'second_friday' %}selected{% endif %}>2nd Friday of Month</option>
                <option value="last_friday" {% if payday and payday.payday_type == 'last_friday' %}selected{% endif %}>Last Friday of Month</option>
            </select>
        </div>
        
        <div id="dayOfMonthField" style="margin-bottom: 20px; {% if payday and payday.payday_type != 'day_of_month' %}display: none;{% endif %}">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Day of Month (1-31)</label>
            <input type="number" name="day" value="{{ payday.day if payday else '1' }}" min="1" max="31"
                   style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Amount</label>
            <input type="number" name="amount" value="{{ payday.amount if payday else '' }}" required step="0.01" min="0"
                   style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px;"
                   placeholder="0.00">
        </div>
        
        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn" style="background: #27ae60; color: white; padding: 12px 24px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold;">
                {{ 'Update' if payday else 'Add' }} Payday
            </button>
            <a href="/paydays" class="btn" style="background: #95a5a6; color: white; padding: 12px 24px; border-radius: 5px; text-decoration: none; font-weight: bold;">Cancel</a>
        </div>
    </form>
</div>

<script>
function togglePaydayFields() {
    var type = document.getElementById('paydayType').value;
    var dayField = document.getElementById('dayOfMonthField');
    var dayInput = dayField.querySelector('input');
    
    if (type === 'day_of_month') {
        dayField.style.display = 'block';
        dayInput.required = true;
    } else {
        dayField.style.display = 'none';
        dayInput.required = false;
    }
}
</script>

{% endblock %}
